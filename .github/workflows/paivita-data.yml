{
"name": "Paivita vuokratuottodata",
"on": {"workflow_dispatch": {}, "schedule": [{"cron": "17 5 2 * *"}]},
"permissions": {"contents": "write"},
"jobs": {"paivita": {"runs-on": "ubuntu-latest", "steps": [
{"uses": "actions/checkout@v4"},
{"uses": "actions/setup-python@v5", "with": {"python-version": "3.12"}},
{"run": "pip install shapely"},
{"run": "python fetch_data.py"},
{"run": "git add postal_yields.geojson && git -c user.name=data-robotti -c user.email=actions@users.noreply.github.com commit -m 'Paivita vuokratuottodata' && git push || echo 'Ei uutta dataa.'"}
] } }
}
